name: Build and Publish Odysseus

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Odysseus Repo
        uses: actions/checkout@v4
        with:
          repository: 'odysseus-dev/odysseus'
          ref: 'main'

      # FIX: This step takes "GitLogos", forces it to "gitlogos", and saves it
      - name: Prepare Lowercase Docker Tag
        run: |
          IMAGE_PATH="ghcr.io/${{ github.repository_owner }}/odysseus"
          echo "DOCKER_TAG=${IMAGE_PATH,,}:latest" >> $GITHUB_ENV

      # The rest of the workflow remains the same, using the new variable
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # References the lowercase tag created in the step above
          tags: ${{ env.DOCKER_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
