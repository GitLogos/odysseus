name: Build and Publish Odysseus

on:
  schedule:
    - cron: '0 0 */5 * *' # Runs at 00:00 UTC every 5 days
  workflow_dispatch:      # Allows you to trigger this manually from the Actions tab

permissions:
  contents: read
  packages: write         # Required to publish to GitHub Container Registry (GHCR)

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the external Odysseus repo directly into the runner's workspace
      - name: Checkout Odysseus Repo
        uses: actions/checkout@v4
        with:
          repository: 'odysseus-dev/odysseus'
          ref: 'main'

      # 2. Set up Docker Buildx (enables modern Docker build features and caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Authenticate with GitHub Packages (GHCR) using the built-in GITHUB_TOKEN
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build and Push the image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Tags the image as: ghcr.io/your-username/odysseus:latest
          tags: |
            ghcr.io/${{ github.repository_owner }}/odysseus:latest
          # Speeds up future builds by caching layers in GitHub Actions
          cache-from: type=gha
          cache-to: type=gha,mode=max