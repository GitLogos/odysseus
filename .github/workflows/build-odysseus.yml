name: Build and Publish Odysseus

on:
  schedule:
    - cron: '0 0 */5 * *' # Runs at 00:00 UTC every 5 days
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: read
  packages: write         # Required to publish to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the external code from the target source
      - name: Checkout Odysseus Repo
        uses: actions/checkout@v4
        with:
          repository: 'odysseus-dev/odysseus'
          ref: 'main'

      # 2. Dynamically pull your repo name (GitLogos/odysseus-docker) and force lowercase
      - name: Prepare Lowercase Docker Tag
        run: |
          IMAGE_PATH="ghcr.io/${{ github.repository }}"
          echo "DOCKER_TAG=${IMAGE_PATH,,}:latest" >> $GITHUB_ENV

      # 3. Setup the build engine
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log into the registry using the workflow's native token
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Build and push to your registry
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
